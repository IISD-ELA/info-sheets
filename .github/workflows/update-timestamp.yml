name: Auto-update Last Updated Date and Author

on:
  push:
    branches:
      - main
    paths:
      - '**/*.md'

jobs:
  update-timestamp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Auto-update timestamp and author in changed info sheet(s)
        run: |
          changed_files=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- '*.md' || true)

          if [ -z "$changed_files" ]; then
            echo "No Markdown files changed in this push."
            exit 0
          fi

          while IFS= read -r file; do
            [ -n "$file" ] || continue
            [ -f "$file" ] || continue

            sed -i "s/\*\*Last Updated:\*\*.*/\*\*Last Updated:\*\*  $(date +'%Y-%m-%d') by ${{ github.actor }}/" "$file"
            git add -- "$file"
          done <<< "$changed_files"

      - name: Commit updated file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --cached --quiet || git commit -m "chore: update last updated date and author"
          git push